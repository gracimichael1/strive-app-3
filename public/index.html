<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1024" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="STRIVE — AI-powered gymnastics scoring and training platform. Upload your routine video, get instant deduction breakdowns, and follow personalized training programs to raise your score." />
    
    <title>STRIVE — See Your Score. Own Your Growth.</title>
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    
    <style>
      /* Critical CSS — prevents flash of white while app loads */
      html, body, #root {
        margin: 0;
        padding: 0;
        background: #0B1024;
        min-height: 100vh;
        overflow-x: hidden;
      }
      /* Loading state */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #root:empty::after {
        content: '';
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 3px solid rgba(196,152,42,0.2);
        border-top-color: #C4982A;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run STRIVE.</noscript>
    <div id="root"></div>
  </body>
</html>
